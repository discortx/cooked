<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>神机-009</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&family=UnifrakturMaguntia&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100%;
            height: 100%;
            font-family: 'Comic Neue', 'Comic Sans MS', cursive;
            color: #fff;
        }

        body {
            background:
                repeating-linear-gradient(45deg,
                    #ff00cc 0px,  #ff00cc 30px,
                    #39ff14 30px, #39ff14 60px,
                    #ff6600 60px, #ff6600 90px,
                    #1a0033 90px, #1a0033 120px);
            background-size: 200% 200%;
            animation: bgPulse 4s linear infinite;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        @keyframes bgPulse {
            0%   { background-position: 0 0;       filter: hue-rotate(0deg); }
            50%  { background-position: 100% 100%; filter: hue-rotate(40deg); }
            100% { background-position: 0 0;       filter: hue-rotate(0deg); }
        }

        /* ── Big red button ── */
        #triggerBtn {
            font-family: 'UnifrakturMaguntia', serif;
            font-size: 2.4rem;
            padding: 28px 60px;
            background: #cc0000;
            color: #fff;
            border: 4px solid #ff4444;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 0 40px #ff0000, 0 0 80px #cc000088;
            transition: transform 0.1s, box-shadow 0.1s;
            letter-spacing: 2px;
        }
        #triggerBtn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 60px #ff0000, 0 0 120px #cc000099;
        }
        #triggerBtn:active {
            transform: scale(0.97);
        }
        #triggerBtn.hidden {
            display: none;
        }

        /* ── Video wrapper ── */
        #videoWrap {
            display: none;
            position: fixed;
            inset: 0;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.85);
            z-index: 10;
        }
        #videoWrap.visible {
            display: flex;
        }
        #mainVideo {
            /* Render at native dimensions — no stretching */
            max-width: none;
            max-height: none;
            width: auto;
            height: auto;
        }

        /* ── Top banner ── */
        #banner {
            position: fixed;
            top: 0;
            left: 50%;
            transform: translateX(-50%) translateY(-120%);
            z-index: 20;
            background: rgba(0, 0, 0, 0.82);
            border: 2px solid #39ff14;
            border-top: none;
            border-radius: 0 0 12px 12px;
            padding: 14px 40px;
            font-family: 'UnifrakturMaguntia', serif;
            font-size: 1.8rem;
            color: #39ff14;
            white-space: nowrap;
            text-shadow: 0 0 12px #39ff14, 0 0 4px #fff;
            transition: transform 0.55s cubic-bezier(0.22, 1, 0.36, 1);
        }
        #banner.show {
            transform: translateX(-50%) translateY(0%);
        }
    </style>
</head>
<body>

    <button id="triggerBtn">&#9654; Play</button>

    <div id="videoWrap">
        <video id="mainVideo" src="Videos/chutti kar.mp4"></video>
    </div>

    <div id="banner">Tou Mera Putar Chutti kr</div>

    <script>
        const btn      = document.getElementById('triggerBtn');
        const wrap     = document.getElementById('videoWrap');
        const video    = document.getElementById('mainVideo');
        const banner   = document.getElementById('banner');

        btn.addEventListener('click', () => {
            video.volume = 1;
            wrap.classList.add('visible');
            btn.classList.add('hidden');
            video.play();
        });

        video.addEventListener('play', () => {
            banner.classList.add('show');
        });

        video.addEventListener('ended', () => {
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
